<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запросы на роботизированные системы</title>
<style>
:root{
  --bg:#070b14; --bg2:#0c1322; --panel:rgba(18,26,44,.72); --panel2:rgba(13,20,36,.9);
  --line:rgba(120,160,220,.14); --txt:#e8eefb; --muted:#8a98b8;
  --cyan:#36e6d6; --blue:#4d8bff; --violet:#9b6bff; --pink:#ff5fae;
  --amber:#ffb454; --green:#4be38c; --red:#ff6b6b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:radial-gradient(1200px 700px at 50% -10%,#16213d 0%,var(--bg2) 45%,var(--bg) 100%);
  color:var(--txt); min-height:100vh; overflow-x:hidden;
}
.wrap{max-width:1280px;margin:0 auto;padding:22px 18px 60px}
header.hd{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--cyan),var(--blue));box-shadow:0 0 24px rgba(54,230,214,.35);font-size:22px}
.hd h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.2px}
.hd p{margin:2px 0 0;color:var(--muted);font-size:13px}

.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 16px;
  backdrop-filter:blur(8px);position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(54,230,214,.06),transparent 60%)}
.kpi .num{font-size:30px;font-weight:800;line-height:1;background:linear-gradient(135deg,#fff,#9fc6ff);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.kpi .lbl{color:var(--muted);font-size:12.5px;margin-top:7px;text-transform:uppercase;letter-spacing:.6px}

.statusbar{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:18px}
.statusbar .t{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.sbtrack{display:flex;height:14px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.sbtrack > div{transition:.3s}
.sbleg{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:12px}
.sbleg span{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:9px 16px;border-radius:11px;
  cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.tab:hover{color:var(--txt);border-color:rgba(120,160,220,.35)}
.tab.active{background:linear-gradient(135deg,rgba(54,230,214,.18),rgba(77,139,255,.18));
  color:#fff;border-color:rgba(54,230,214,.5);box-shadow:0 0 18px rgba(54,230,214,.18)}

.view{display:none} .view.active{display:block}

.graph-wrap{display:grid;grid-template-columns:1.35fr .95fr;gap:18px;align-items:start}
.canvas-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:8px;position:relative;overflow:hidden;min-height:360px}
.crumb{position:absolute;top:14px;left:16px;z-index:5;font-size:13px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.crumb b{color:var(--cyan);cursor:pointer}
.crumb .sep{opacity:.5}
.hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:12px;color:var(--muted);pointer-events:none}
svg{width:100%;height:auto;display:block;touch-action:manipulation}

.node{cursor:pointer}
.node circle{transition:.35s cubic-bezier(.4,1.3,.5,1),opacity .3s,stroke .2s}
.node text{pointer-events:none;font-weight:600;fill:#fff}
.link{transition:.35s,opacity .3s}
.dim{opacity:.16}
.pulse{animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;min-height:360px}
.panel h3{margin:0 0 4px;font-size:17px}
.panel .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.complist{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow:auto}
.crow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;
  background:var(--panel2);border:1px solid var(--line);cursor:pointer;transition:.18s}
.crow:hover{border-color:rgba(54,230,214,.45);transform:translateX(3px)}
.crow .nm{font-weight:600;font-size:14px}
.crow .cnt{font-size:12px;color:var(--muted);background:rgba(120,160,220,.12);padding:3px 9px;border-radius:20px;white-space:nowrap}
.reqlist{display:flex;flex-direction:column;gap:10px;max-height:600px;overflow:auto;padding-right:4px}
.req{padding:13px 14px;border-radius:13px;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--cyan)}
.req .rq{font-size:14px;line-height:1.45;margin-bottom:9px}
.req .meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge.scen{background:rgba(120,160,220,.13);color:#bcd0f5}
.num-pill{font-size:11px;color:var(--muted);margin-left:auto}
.backbtn{background:transparent;border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:9px;
  cursor:pointer;font-size:13px;margin-bottom:12px}
.backbtn:hover{color:#fff;border-color:rgba(54,230,214,.4)}

.searchbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.searchbar input{flex:1;min-width:200px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:11px 14px;border-radius:11px;font-size:14px;outline:none}
.searchbar input:focus{border-color:rgba(54,230,214,.5)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;border-top:3px solid var(--blue)}
.tcard .h{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.tcard .cust{font-weight:700;font-size:15px}
.tcard .rq{font-size:13.5px;color:#cdd9f3;margin:6px 0 10px;line-height:1.45}
.tcard .desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:11px}
.tcard .ft{display:flex;flex-wrap:wrap;gap:7px;align-items:center;font-size:12px}
.tcard .exec{color:#9fc6ff}
.contacts-table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:16px;overflow:hidden}
.contacts-table th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  padding:13px 16px;border-bottom:1px solid var(--line);font-weight:600}
.contacts-table td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
.contacts-table tr:last-child td{border-bottom:none}
.contacts-table tr:hover td{background:rgba(120,160,220,.05)}

@media(max-width:880px){
  .graph-wrap{grid-template-columns:1fr}
  .panel{min-height:auto}
  .kpi .num{font-size:25px}
}
</style>
</head>

    const p=typePts[t], col=typeColorMap[t];
    const dim = selType && selType!==t;
    const node=el('g',{class:'node'+(dim?' dim':'')},svg);
    el('circle',{cx:p.x,cy:p.y,r:typeR(t),fill:col+'22',stroke:col,
      'stroke-width':selType===t?3.5:2, class:(!selType?'pulse':'')},node);
    el('circle',{cx:p.x,cy:p.y,r:6,fill:col},node);
    const words=t.split(' '); let lines=[],cur='';
    words.forEach(w=>{ if((cur+' '+w).trim().length>16){lines.push(cur.trim());cur=w;} else cur+=' '+w; });
    if(cur.trim())lines.push(cur.trim());
    const ty=p.y - (lines.length-1)*7 + 2;
    lines.forEach((ln,k)=>{
      el('text',{x:p.x,y:ty+k*13,'text-anchor':'middle','font-size':11.5,'font-weight':600},node).textContent=ln;
    });
    el('text',{x:p.x,y:p.y+typeR(t)+16,'text-anchor':'middle','font-size':14,'font-weight':800,fill:col},node).textContent=types[t].count;
    node.onclick=()=>{selType=(selType===t?null:t);selCompany=null;render();updatePanel();};
  });

  const hub=el('g',{class:'node'},svg);
  el('circle',{cx:CX,cy:CY,r:58,fill:'url(#hubg)',stroke:'rgba(54,230,214,.6)','stroke-width':2},hub);
  el('text',{x:CX,y:CY-6,'text-anchor':'middle','font-size':30,'font-weight':800},hub).textContent=R.length;
  el('text',{x:CX,y:CY+16,'text-anchor':'middle','font-size':13,fill:'#8a98b8'},hub).textContent='запросов';
  hub.onclick=()=>{selType=null;selCompany=null;render();updatePanel();};

  let cb='<b onclick="resetMap()">Все типы</b>';
  if(selType)cb+='<span class="sep">›</span><b onclick="pickType(\''+js(selType)+'\')">'+esc(selType)+'</b>';
  if(selCompany)cb+='<span class="sep">›</span><span style="color:#fff">'+esc(selCompany)+'</span>';
  document.getElementById('crumb').innerHTML=cb;
  document.getElementById('hint').textContent =
    !selType ? 'Нажмите на тип робота, чтобы раскрыть заказчиков'
    : !selCompany ? 'Нажмите на заказчика, чтобы увидеть запросы'
    : '';
}
function resetMap(){selType=null;selCompany=null;render();updatePanel();}
window.resetMap=resetMap;
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function js(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function updatePanel(){
  const p=document.getElementById('panel');
  if(!selType){
    const rows=typeNames.map(t=>'<div class="crow" onclick="pickType(\''+js(t)+'\')">'+
      '<span class="nm"><i class="dot" style="background:'+typeColorMap[t]+'"></i> '+esc(t)+'</span>'+
      '<span class="cnt">'+types[t].count+' запр.</span></div>').join('');
    p.innerHTML='<h3>'+typeNames.length+' типов роботизированных систем</h3>'+
      '<div class="sub">Всего '+R.length+' запросов от '+totalCompanies+' заказчиков. Выберите тип:</div>'+
      '<div class="complist">'+rows+'</div>';
    return;
  }
  const comps=Object.keys(types[selType].companies).sort((a,b)=>types[selType].companies[b].length-types[selType].companies[a].length);
  if(!selCompany){
    const rows=comps.map(c=>'<div class="crow" onclick="pickCompany(\''+js(c)+'\')">'+
      '<span class="nm">'+esc(c)+'</span>'+
      '<span class="cnt">'+types[selType].companies[c].length+' запр.</span></div>').join('');
    p.innerHTML='<button class="backbtn" onclick="resetMap()">← Все типы</button>'+
      '<h3 style="color:'+typeColorMap[selType]+'">'+esc(selType)+'</h3>'+
      '<div class="sub">'+types[selType].count+' запросов · '+comps.length+' заказчиков</div>'+
      '<div class="complist">'+rows+'</div>';
    return;
  }
  const reqs=types[selType].companies[selCompany];
  const items=reqs.map(r=>'<div class="req" style="border-left-color:'+statusColor(norm(r.status))+'">'+
    '<div class="rq">'+esc(r.request)+'</div>'+
    '<div class="meta">'+
      '<span class="badge scen">'+esc(norm(r.scenario)||'—')+'</span>'+
      '<span class="badge" style="background:'+statusColor(norm(r.status))+'22;color:'+statusColor(norm(r.status))+'">'+esc(norm(r.status)||'—')+'</span>'+
      '<span class="num-pill">№'+esc(r.num)+'</span>'+
    '</div></div>').join('');
  p.innerHTML='<button class="backbtn" onclick="pickType(\''+js(selType)+'\')">← '+esc(selType)+'</button>'+
    '<h3>'+esc(selCompany)+'</h3>'+
    '<div class="sub">'+reqs.length+' запрос(ов) · тип: '+esc(selType)+'</div>'+
    '<div class="reqlist">'+items+'</div>';
}
function pickType(t){selType=t;selCompany=null;render();updatePanel();}
function pickCompany(c){selCompany=c;render();updatePanel();}
window.pickType=pickType; window.pickCompany=pickCompany;

render(); updatePanel();

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('v-'+tab.dataset.v).classList.add('active');
  };
});

function renderTests(q){
  q=(q||'').toLowerCase();
  const list=TESTS.filter(t=>!q||JSON.stringify(t).toLowerCase().includes(q));
  document.getElementById('testcards').innerHTML = list.map(t=>{
    const sc=/успешн|реализов|завершен/i.test(t.status)?'#4be38c':/проработк|методолог/i.test(t.status)?'#ffb454':'#4d8bff';
    return '<div class="tcard" style="border-top-color:'+sc+'">'+
      '<div class="h"><span class="cust">'+esc(t.customer)+'</span>'+
        '<span class="badge" style="background:'+sc+'22;color:'+sc+'">'+esc(t.status)+'</span></div>'+
      '<div class="rq">'+esc(t.request)+'</div>'+
      '<div class="desc">'+esc(t.testing)+'</div>'+
      '<div class="ft"><span class="exec">\u{1F3ED} '+esc(t.executor)+'</span>'+
        (t.manager?'<span class="badge scen">\u{1F464} '+esc(t.manager)+'</span>':'')+'</div>'+
    '</div>';}).join('') || '<div style="color:#8a98b8;padding:30px">Ничего не найдено</div>';
}
renderTests();
document.getElementById('tsearch').oninput=e=>renderTests(e.target.value);

function renderContacts(q){
  q=(q||'').toLowerCase();
  const list=CONTACTS.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q));
  document.getElementById('ctable').innerHTML =
    '<thead><tr><th>Компания</th><th>Контактное лицо</th><th>Контакт</th><th>Статус</th></tr></thead><tbody>'+
    list.map(c=>'<tr><td><b>'+esc(c.company)+'</b></td><td>'+esc(c.person)+'</td>'+
      '<td>'+esc(c.contact)+'</td><td>'+(esc(c.note)||'—')+'</td></tr>').join('')+'</tbody>';
}
renderContacts();
document.getElementById('csearch').oninput=e=>renderContacts(e.target.value);
</script>
</body>
</html>
