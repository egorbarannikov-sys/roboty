<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Запросы на роботизированные системы · МИК</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ease:cubic-bezier(0.22,1,0.36,1);
  --bg:#0A0D11;--card:#0E1217;--card-2:#141A20;
  --border:rgba(255,255,255,.16);--border-soft:rgba(255,255,255,.09);
  --fg:#FFFFFF;--muted:#8E97A1;--faint:#5A636D;
  --g:#22B24A;--g-bright:#2BD957;--g-soft:rgba(43,217,87,.12);
  --amber:#D9A23B;--amber-soft:rgba(217,162,59,.14);
  --font:'Onest',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;--r:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);color:var(--fg);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.4;background:var(--bg)}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:1320px;margin:0 auto;padding:30px 28px 80px}
.top{display:flex;align-items:center;gap:16px;margin-bottom:26px}
.mark{height:52px;flex-shrink:0;display:flex;align-items:center}.mark img{height:52px;width:auto;display:block}
.htext h1{font-weight:600;font-size:30px;letter-spacing:-.025em;line-height:1.05}
.htext .hsub{font-size:14.5px;color:var(--muted);margin-top:6px;font-weight:400}
.brandtag{margin-left:auto;text-align:right;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.13em;font-weight:500;line-height:1.5}
.bento{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
.tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;position:relative;overflow:hidden;display:flex;flex-direction:column;
  opacity:0;transform:translateY(14px);animation:rise .55s var(--ease) forwards;transition:border-color .3s var(--ease),box-shadow .3s var(--ease),transform .3s var(--ease)}
@keyframes rise{to{opacity:1;transform:none}}
.tile.hov:hover{border-color:var(--g-bright);box-shadow:0 0 0 1px var(--g-bright),0 0 40px rgba(43,217,87,.16)}
.tile.hov:hover .big{color:var(--g-bright)}
.kpi{grid-column:span 2;cursor:default}
.big{font-size:42px;font-weight:600;line-height:1;letter-spacing:-.03em;color:var(--fg);transition:color .3s var(--ease)}
.big.amber{color:var(--amber)}
.cap{font-size:13px;line-height:18px;color:var(--muted);font-weight:400;margin-top:11px}
.statile{grid-column:span 12;padding:22px 24px}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.panel-t{font-size:16px;font-weight:600;letter-spacing:-.01em}
.meta{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:500}
.sbtrack{display:flex;height:12px;border-radius:999px;overflow:hidden;border:1px solid var(--border-soft)}
.sbtrack>div{transition:.3s}
.sbleg{display:flex;flex-wrap:wrap;gap:9px 20px;margin-top:14px}
.sbleg span{font-size:12.5px;color:var(--muted);display:inline-flex;align-items:center;gap:7px;font-weight:400}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.nav{display:flex;gap:8px;margin:26px 0 18px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:9px;padding:10px 20px;border-radius:999px;border:1px solid var(--border-soft);background:var(--card);
  color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:.2s var(--ease)}
.pill:hover{color:var(--fg);border-color:var(--border)}
.pill.active{color:#06110D;background:var(--g-bright);border-color:var(--g-bright)}
.pill .pn{font-size:12px;font-weight:600;padding:1px 8px;border-radius:999px;background:rgba(255,255,255,.14)}
.pill.active .pn{background:rgba(6,17,13,.18);color:#06110D}
.view{display:none}.view.active{display:block}
.maprow{display:grid;grid-template-columns:1.4fr .9fr;gap:16px;align-items:stretch}
.graphtile{padding:22px 18px;min-height:540px}
.crumb{display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:4px;min-height:20px}
.crumb b{color:var(--g-bright);cursor:pointer;font-weight:500}
.crumb .sep{opacity:.45}
.graph-body{flex:1;position:relative;margin-top:6px}
#gsvg{width:100%;height:100%;display:block;position:absolute;inset:0}
.hint{position:absolute;left:6px;bottom:4px;font-size:12px;color:var(--faint);pointer-events:none}
.gedge{fill:none;stroke:rgba(255,255,255,.16);stroke-width:1.5;transition:opacity .3s}
.gflow{fill:none;stroke:url(#mg);stroke-width:2.6;stroke-linecap:round;stroke-dasharray:1 9;filter:drop-shadow(0 0 5px rgba(43,217,87,.7));animation:flow 1.3s linear infinite}
@keyframes flow{to{stroke-dashoffset:-30}}
.gnode{cursor:pointer}
.gnode .ring{fill:none;stroke:var(--g-bright);stroke-width:1.5;opacity:0;transition:opacity .3s}
.gnode .dot{transition:r .25s var(--ease),opacity .3s,fill .3s}
.gnode text{font-family:var(--font);font-weight:500;font-size:12px;fill:var(--fg)}
.gnode .role{font-weight:400;font-size:10px;fill:var(--muted)}
.gdim{opacity:.16}
.detile{padding:22px;min-height:540px}
.detile h3{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:3px}
.detile .sub{font-size:13px;color:var(--muted);margin-bottom:16px;font-weight:400}
.rowlist{display:flex;flex-direction:column;gap:8px;overflow:auto;max-height:440px;padding-right:2px}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 15px;border-radius:14px;background:var(--card-2);
  border:1px solid transparent;cursor:pointer;transition:.2s var(--ease)}
.row:hover{border-color:rgba(43,217,87,.4);background:rgba(43,217,87,.06)}
.row .nm{font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px}
.row .cnt{font-size:12px;color:var(--muted);background:rgba(255,255,255,.06);padding:3px 11px;border-radius:999px;white-space:nowrap;font-weight:500}
.row:hover .cnt{color:var(--g-bright);background:var(--g-soft)}
.backbtn{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--border-soft);color:var(--muted);
  padding:7px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-family:inherit;margin-bottom:14px;transition:.2s var(--ease)}
.backbtn:hover{color:var(--fg);border-color:var(--g-bright)}
.reqlist{display:flex;flex-direction:column;gap:11px;overflow:auto;max-height:440px;padding-right:2px}
.req{padding:15px 16px;border-radius:16px;background:var(--card-2);border:1px solid var(--border-soft);border-left:3px solid var(--g)}
.req.flagged{border-left-color:var(--amber)}
.req .rq{font-size:14px;line-height:1.45;margin-bottom:11px;font-weight:400}
.req .mrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge{font-size:11px;padding:4px 11px;border-radius:999px;font-weight:500;white-space:nowrap}
.badge.scen{background:rgba(255,255,255,.06);color:var(--muted)}
.badge.flag{background:var(--amber-soft);color:var(--amber)}
.numpill{font-size:11px;color:var(--faint);margin-left:auto;font-weight:500}
.flagnote{font-size:12px;color:var(--amber);margin-top:9px;display:flex;gap:6px;align-items:center}
.search{display:flex;margin-bottom:16px}
.search input{flex:1;background:var(--card);border:1px solid var(--border-soft);color:var(--fg);padding:13px 18px;border-radius:999px;font-size:14px;font-family:inherit;outline:none;transition:.2s var(--ease)}
.search input:focus{border-color:var(--g-bright)}
.search input::placeholder{color:var(--faint)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;transition:.3s var(--ease)}
.tcard:hover{border-color:var(--g-bright);box-shadow:0 0 0 1px var(--g-bright),0 0 40px rgba(43,217,87,.14)}
.tcard .th{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:9px}
.tcard .cust{font-weight:600;font-size:15px;letter-spacing:-.01em}
.tcard .rq{font-size:13.5px;color:#cdd6de;margin:4px 0 12px;line-height:1.45;font-weight:400}
.tcard .desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;font-weight:400}
.tcard .tf{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px}
.tcard .exec{color:var(--g-bright);font-weight:500}
.ctable{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.ctable th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:15px 18px;border-bottom:1px solid var(--border-soft);font-weight:600}
.ctable td{padding:15px 18px;border-bottom:1px solid var(--border-soft);font-size:14px;font-weight:400}
.ctable tr:last-child td{border-bottom:none}.ctable tbody tr:hover td{background:rgba(43,217,87,.05)}.ctable td b{font-weight:600}
@media(max-width:1100px){.kpi{grid-column:span 4}.maprow{grid-template-columns:1fr}.graphtile{min-height:460px}.detile{min-height:auto}}
@media(max-width:640px){.wrap{padding:20px 14px 70px}.htext h1{font-size:22px}.brandtag{display:none}.kpi{grid-column:span 6}.big{font-size:32px}.cards{grid-template-columns:1fr}
  .graphtile{min-height:58vh;padding:14px 4px}.detile{min-height:auto}.graph-body{margin-top:2px}.crumb{font-size:12px;padding:0 8px}.sbleg span{font-size:11.5px}}
@media(prefers-reduced-motion:reduce){.tile{opacity:1;transform:none;animation:none}.gflow{animation:none}}
</style>
</head>

  const cd=document.createElementNS(NS,'circle');cd.setAttribute('class','dot');cd.setAttribute('r',mob?31:38);cd.setAttribute('fill','var(--g)');cd.style.filter='drop-shadow(0 0 10px rgba(43,217,87,.5))';cg.append(cd);
  const cl=centerLabel();
  const ct=document.createElementNS(NS,'text');ct.setAttribute('text-anchor','middle');ct.setAttribute('y',mob?-1:0);ct.style.fontSize=mob?'17px':'20px';ct.style.fontWeight='600';ct.style.fill='#06110D';ct.textContent=cl.big;cg.append(ct);
  const cs=document.createElementNS(NS,'text');cs.setAttribute('text-anchor','middle');cs.setAttribute('y',mob?12:15);cs.style.fontSize='9px';cs.style.fill='rgba(6,17,13,.75)';cs.textContent=cl.sub;cg.append(cs);
  cg.addEventListener('click',e=>{e.stopPropagation();zoomOut();});
  svg.appendChild(cg);model._center=cg;
  layout();
  document.getElementById('hint').textContent=!fType?'Нажмите на тип робота':!fOp?'Нажмите на операцию · центр — назад':'Нажмите на заказчика · центр — назад';
  crumb();
}
function curve(A,B){const mx=(A.x+B.x)/2,my=(A.y+B.y)/2,dx=B.x-A.x,dy=B.y-A.y,l=Math.hypot(dx,dy)||1,o=l*.12;return'M'+A.x+','+A.y+' Q'+(mx+(-dy/l)*o)+','+(my+(dx/l)*o)+' '+B.x+','+B.y;}
function layout(){const r=svg.getBoundingClientRect();W=r.width;H=r.height;svg.setAttribute('viewBox','0 0 '+W+' '+H);
  const C={x:.5*W,y:.5*H};model.kids.forEach(c=>{c.x=c.fx*W;c.y=c.fy*H;});
  edgeEls.forEach(({p,c})=>p.setAttribute('d',curve(C,c)));
  nodeEls.forEach(({g,c})=>{g.setAttribute('transform','translate('+c.x+','+c.y+')');c._t1.setAttribute('y',c.r+15);c._t2.setAttribute('y',c.r+15+c._lines*12+2);});
  if(model._center)model._center.setAttribute('transform','translate('+C.x+','+C.y+')');
}
new ResizeObserver(()=>{if(model)layout();}).observe(svg.parentElement);
function onKid(c){if(c.kind==='type'){fType=c.key;fOp=null;selComp=null;}else if(c.kind==='op'){fOp=c.key;selComp=null;}else{selComp=(selComp===c.key?null:c.key);}render();panel();}
function zoomOut(){if(selComp){selComp=null;}else if(fOp){fOp=null;}else if(fType){fType=null;}render();panel();}
function goRoot(){fType=null;fOp=null;selComp=null;render();panel();}
function goType(t){fType=t;fOp=null;selComp=null;render();panel();}
function goOp(o){fOp=o;selComp=null;render();panel();}
function pickComp(c){selComp=c;render();panel();}
window.goRoot=goRoot;window.goType=goType;window.goOp=goOp;window.pickComp=pickComp;
function crumb(){let s='<b onclick="goRoot()">Все типы</b>';
  if(fType)s+='<span class="sep">/</span><b onclick="goType(\''+js(fType)+'\')">'+esc(short(fType,22))+'</b>';
  if(fOp)s+='<span class="sep">/</span><b onclick="goOp(\''+js(fOp)+'\')">'+esc(short(fOp,22))+'</b>';
  if(selComp)s+='<span class="sep">/</span><span style="color:#fff">'+esc(selComp)+'</span>';
  document.getElementById('crumb').innerHTML=s;}

/* side panel mirrors current level */
function panel(){const p=document.getElementById('panel');
  if(!fType){
    const rows=typeNames.map(t=>'<div class="row" onclick="goType(\''+js(t)+'\')"><span class="nm"><i class="dot" style="background:var(--g)"></i>'+esc(t)+'</span><span class="cnt">'+cnt(reqsOf(t))+'</span></div>').join('');
    p.innerHTML='<h3>'+typeNames.length+' типов роботизированных систем</h3><div class="sub">'+R.length+' запросов · '+totalCompanies+' заказчиков · '+totalOps+' тех. операций</div><div class="rowlist">'+rows+'</div>';return;}
  if(!fOp){
    const rows=opsOf(fType).map(([o,c])=>'<div class="row" onclick="goOp(\''+js(o)+'\')"><span class="nm">'+esc(o)+'</span><span class="cnt">'+c+'</span></div>').join('');
    p.innerHTML='<button class="backbtn" onclick="goRoot()">← Все типы</button><h3>'+esc(fType)+'</h3><div class="sub">'+cnt(reqsOf(fType))+' запросов · '+opsOf(fType).length+' операций</div><div class="rowlist">'+rows+'</div>';return;}
  if(!selComp){
    const rows=compsOf(fType,fOp).map(([c,n,fl])=>'<div class="row" onclick="pickComp(\''+js(c)+'\')"><span class="nm">'+(fl?'<i class="dot" style="background:var(--amber)"></i>':'')+esc(c)+'</span><span class="cnt">'+n+'</span></div>').join('');
    p.innerHTML='<button class="backbtn" onclick="goType(\''+js(fType)+'\')">← '+esc(short(fType,20))+'</button><h3>'+esc(fOp)+'</h3><div class="sub">'+cnt(reqsOf(fType,fOp))+' запросов · '+compsOf(fType,fOp).length+' заказчиков · тип: '+esc(fType)+'</div><div class="rowlist">'+rows+'</div>';return;}
  const reqs=reqsOf(fType,fOp,selComp);
  const items=reqs.map(r=>{const sc=statusColor(norm(r.status));const fl=r.flag;
    return '<div class="req'+(fl?' flagged':'')+'"><div class="rq">'+esc(r.request)+'</div><div class="mrow"><span class="badge scen">'+esc(norm(r.scenario)||'—')+'</span><span class="badge" style="background:'+sc+'22;color:'+sc+'">'+esc(norm(r.status)||'—')+'</span>'+(fl?'<span class="badge flag">уточнить</span>':'')+'<span class="numpill">№'+esc(r.num)+'</span></div>'+(fl?'<div class="flagnote">⚠ '+esc(r.flag)+'</div>':'')+'</div>';}).join('');
  p.innerHTML='<button class="backbtn" onclick="goOp(\''+js(fOp)+'\')">← '+esc(short(fOp,20))+'</button><h3>'+esc(selComp)+'</h3><div class="sub">'+reqs.length+' запрос(ов) · '+esc(fOp)+'</div><div class="reqlist">'+items+'</div>';}
render();panel();
svg.addEventListener('click',()=>{});

/* tabs */
document.querySelectorAll('.pill').forEach(pl=>{pl.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));pl.classList.add('active');document.getElementById('v-'+pl.dataset.v).classList.add('active');if(pl.dataset.v==='map'&&model)setTimeout(layout,30);};});

/* tests */
function renderTests(q){q=(q||'').toLowerCase();const list=TESTS.filter(t=>!q||JSON.stringify(t).toLowerCase().includes(q));
  document.getElementById('testcards').innerHTML=list.map(t=>{const sc=/успешн|реализов|завершен/i.test(t.status)?'#2BD957':/проработк|методолог/i.test(t.status)?'#8893A0':'#5DA985';
    return '<div class="tcard"><div class="th"><span class="cust">'+esc(t.customer)+'</span><span class="badge" style="background:'+sc+'22;color:'+sc+'">'+esc(t.status)+'</span></div><div class="rq">'+esc(t.request)+'</div><div class="desc">'+esc(t.testing)+'</div><div class="tf"><span class="exec">'+esc(t.executor)+'</span>'+(t.manager?'<span class="badge scen">'+esc(t.manager)+'</span>':'')+'</div></div>';}).join('')||'<div style="color:var(--faint);padding:30px">Ничего не найдено</div>';}
renderTests();document.getElementById('tsearch').oninput=e=>renderTests(e.target.value);
/* contacts */
function renderContacts(q){q=(q||'').toLowerCase();const list=CONTACTS.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q));
  document.getElementById('ctable').innerHTML='<thead><tr><th>Компания</th><th>Контактное лицо</th><th>Контакт</th><th>Статус</th></tr></thead><tbody>'+list.map(c=>'<tr><td><b>'+esc(c.company)+'</b></td><td>'+esc(c.person)+'</td><td>'+esc(c.contact)+'</td><td>'+(esc(c.note)||'—')+'</td></tr>').join('')+'</tbody>';}
renderContacts();document.getElementById('csearch').oninput=e=>renderContacts(e.target.value);
</script>
</body>
</html>
